services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: quantos-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quantos}
      POSTGRES_USER: ${POSTGRES_USER:-quantos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quantos_local}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quantos} -d ${POSTGRES_DB:-quantos}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: quantos-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: quantos-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-quantos}:${POSTGRES_PASSWORD:-quantos_local}@postgres:5432/${POSTGRES_DB:-quantos}
      REDIS_URL: redis://redis:6379/0
      PORTFOLIO_SERVICE_URL: http://portfolio:8002
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      portfolio:
        condition: service_started
    volumes:
      - ./services/api-gateway:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped

  market-data:
    build:
      context: ./services/market-data-service
      dockerfile: Dockerfile
    container_name: quantos-market-data
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-quantos}:${POSTGRES_PASSWORD:-quantos_local}@postgres:5432/${POSTGRES_DB:-quantos}
      REDIS_URL: redis://redis:6379/1
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/market-data-service:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload"
    restart: unless-stopped

  portfolio:
    build:
      context: ./services/portfolio-service
      dockerfile: Dockerfile
    container_name: quantos-portfolio
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-quantos}:${POSTGRES_PASSWORD:-quantos_local}@postgres:5432/${POSTGRES_DB:-quantos}
      REDIS_URL: redis://redis:6379/2
      MARKET_DATA_SERVICE_URL: http://market-data:8001
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      market-data:
        condition: service_started
    volumes:
      - ./services/portfolio-service:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload"
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: quantos-web
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
      NEXT_PUBLIC_MARKET_DATA_URL: ${NEXT_PUBLIC_MARKET_DATA_URL:-http://localhost:8001}
      NEXT_PUBLIC_MARKET_DATA_WS_URL: ${NEXT_PUBLIC_MARKET_DATA_WS_URL:-ws://localhost:8001}
      NEXT_PUBLIC_PORTFOLIO_URL: ${NEXT_PUBLIC_PORTFOLIO_URL:-http://localhost:8002}
    ports:
      - "3000:3000"
    depends_on:
      - api
      - market-data
      - portfolio
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
