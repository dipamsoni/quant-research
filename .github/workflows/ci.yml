name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (web + packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  backend:
    name: Backend (api-gateway)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb-ha:pg16
        env:
          POSTGRES_DB: quantos_test
          POSTGRES_USER: quantos
          POSTGRES_PASSWORD: quantos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install deps
        working-directory: services/api-gateway
        run: uv sync --frozen

      - name: Lint (ruff)
        working-directory: services/api-gateway
        run: uv run ruff check .

      - name: Format check (ruff)
        working-directory: services/api-gateway
        run: uv run ruff format --check .

      - name: Typecheck (mypy)
        working-directory: services/api-gateway
        run: uv run mypy app

      - name: Tests
        working-directory: services/api-gateway
        env:
          DATABASE_URL: postgresql+asyncpg://quantos:quantos_test@localhost:5432/quantos_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test_secret
          JWT_REFRESH_SECRET: test_refresh_secret
          ENVIRONMENT: test
        run: uv run pytest -q

  docker-build:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: services/api-gateway
          push: false
          tags: quantos/api-gateway:ci
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: false
          tags: quantos/web:ci
