name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend ───────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  backend-typecheck:
    name: Backend typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - run: uv sync --frozen
      - run: uv run mypy app/

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api-gateway
    services:
      postgres:
        image: timescale/timescaledb-ha:pg16
        env:
          POSTGRES_DB: quantos_test
          POSTGRES_USER: quantos
          POSTGRES_PASSWORD: quantos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quantos -d quantos_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://quantos:quantos_test@localhost:5432/quantos_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-secret-at-least-32-chars-long-for-tests
      JWT_REFRESH_SECRET: ci-refresh-secret-also-32-chars-min
      JWT_ACCESS_TTL_SECONDS: "900"
      JWT_REFRESH_TTL_SECONDS: "2592000"
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - run: uv sync --frozen
      - run: uv run alembic upgrade head
      - run: uv run pytest tests/ -q

  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "9"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  # ─── Docker build verification ─────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build api-gateway image
        uses: docker/build-push-action@v6
        with:
          context: services/api-gateway
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
